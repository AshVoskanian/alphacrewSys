<div class="chip-count-select" [class.disabled]="isDisabled()">
  <!-- Selected chips with +/- -->
  @if (chipsWithLabel().length) {
    <div class="chip-list">
      @for (chip of chipsWithLabel(); track chip.id) {
        <div class="chip">
          <span class="chip-label">{{ chip.label }}</span>
          <div class="chip-actions">
            <button
              type="button"
              class="chip-btn chip-btn-minus"
              [attr.aria-label]="'შემცირება ' + chip.label"
              (click)="decrement(chip.id)"
              [disabled]="isDisabled()"
            >−</button>
            <span class="chip-count">{{ chip.count }}</span>
            <button
              type="button"
              class="chip-btn chip-btn-plus"
              [attr.aria-label]="'მომატება ' + chip.label"
              (click)="increment(chip.id)"
              [disabled]="isDisabled()"
            >+</button>
          </div>
          <button
            type="button"
            class="chip-remove"
            [attr.aria-label]="'წაშლა ' + chip.label"
            (click)="removeChip(chip.id)"
            [disabled]="isDisabled()"
          >×</button>
        </div>
      }
    </div>
  }

  <!-- Dropdown: add from available options -->
  @if (availableOptions().length) {
    <div class="chip-add">
      <select
        class="form-select chip-select"
        [value]="selectedOptionId() ?? ''"
        (change)="onSelectChange($event)"
        [disabled]="isDisabled()"
        [attr.aria-label]="placeholder()"
      >
        <option value="" disabled>{{ placeholder() }}</option>
        @for (opt of availableOptions(); track opt.id) {
          <option [value]="opt.id">{{ opt.label }}</option>
        }
      </select>
    </div>
  }
</div>
