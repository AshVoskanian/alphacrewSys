<form class="flex flex-col gap-12" [formGroup]="form" (ngSubmit)="submit()">
  <div class="row g-3">
    <div class="col col-sm-6 col-md-4">
      <label class="form-label">Venue Name</label>
      <div class="input-group">
        <input class="form-control" type="text" formControlName="venueName">
        <span class="input-group-text bg-light-secondary">
          <i class="fa-solid fa-building txt-secondary"></i>
        </span>
      </div>
    </div>

    <div class="col col-sm-6 col-md-4">
      <label class="form-label" for="region">Region</label>
      <select2 [data]="regions()" [templates]="template" id="region" formControlName="regionId">
        <ng-template #template let-item="label">
          {{ item }}
        </ng-template>
      </select2>
    </div>

    <div class="col col-sm-6 col-md-4">
      <label class="form-label">OOT(£)</label>
      <div class="input-group">
        <input class="form-control" type="number" formControlName="oot">
        <span class="input-group-text bg-light-secondary">
        <i class="fa-solid fa-route txt-secondary"></i>
      </span>
      </div>
    </div>

    <div class="col col-sm-6 col-md-4">
      <label class="form-label">Driving Bonus</label>
      <div class="input-group">
        <input class="form-control" type="number" formControlName="drivingBonus">
        <span class="input-group-text bg-light-secondary">
        <i class="fa-solid fa-car txt-secondary"></i>
      </span>
      </div>
    </div>

    <div class="col col-sm-6 col-md-4">
      <label class="form-label">Contact 1</label>
      <div class="input-group">
        <input class="form-control" type="text" formControlName="onSiteContact">
        <span class="input-group-text bg-light-secondary">
        <i class="fa-solid fa-user txt-secondary"></i>
      </span>
      </div>
    </div>

    <div class="col col-sm-6 col-md-4">
      <label class="form-label">Contact 2</label>
      <div class="input-group">
        <input class="form-control" type="text" formControlName="onSiteContact2">
        <span class="input-group-text bg-light-secondary">
        <i class="fa-solid fa-user-friends txt-secondary"></i>
      </span>
      </div>
    </div>

    <div class="col col-md-4">
      <label class="form-label">Address</label>
      <div class="input-group">
        <input #addressInput class="form-control" type="text" formControlName="address">
        <span class="input-group-text bg-light-secondary">
          <i class="fa-solid fa-map-pin txt-secondary"></i>
        </span>
      </div>
    </div>

    <div class="col col-sm-6 col-md-4">
      <label class="form-label">Postal Code</label>
      <div class="input-group">
        <input class="form-control" type="text" formControlName="postCode">
        <span class="input-group-text bg-light-secondary">
        <i class="fa-solid fa-location-dot txt-secondary"></i>
      </span>
      </div>
    </div>

    <div class="col col-sm-6 col-md-2">
      <label>Risk Assessment</label>
      <div class="flex gap-12 m-t-2">
        <div class="form-check">
          <input type="radio"
                 class="form-check-input" id="riskAssessmentYes"
                 name="riskAssessment"
                 [value]="true"
                 formControlName="riskAssessment">
          <label class="form-check-label" for="riskAssessmentYes">
            Yes
          </label>
        </div>

        <div class="form-check">
          <input type="radio"
                 class="form-check-input" id="riskAssessmentNo"
                 name="riskAssessment"
                 [value]="false"
                 formControlName="riskAssessment">
          <label class="form-check-label" for="riskAssessmentNo">
            No
          </label>
        </div>
      </div>
    </div>

    <div class="col col-sm-6 col-md-2">
      <label>Temporary Use</label>
      <div class="flex gap-12 m-t-2">
        <div class="form-check">
          <input type="radio"
                 class="form-check-input" id="temporaryEntryYes"
                 name="temporaryEntry"
                 [value]="true"
                 formControlName="temporaryEntry">
          <label class="form-check-label" for="temporaryEntryYes">
            Yes
          </label>
        </div>

        <div class="form-check">
          <input type="radio"
                 class="form-check-input" id="temporaryEntryNo"
                 name="temporaryEntry"
                 [value]="false"
                 formControlName="temporaryEntry">
          <label class="form-check-label" for="temporaryEntryNo">
            No
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="main-divider m-y-12">
    <div class="divider-body divider-body-1 divider-secondary">
      <div class="divider-p-secondary p-0"></div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col col-sm-6 col-md-2">
      <label class="text-danger">Important note:</label>
      <div class="flex gap-12">
        <div class="form-check">
          <input type="radio"
                 class="form-check-input" id="yes"
                 [value]="true"
                 formControlName="importantNotes">
          <label class="form-check-label" for="yes">
            Yes
          </label>
        </div>

        <div class="form-check">
          <input type="radio"
                 class="form-check-input" id="no"
                 [value]="false"
                 formControlName="importantNotes">
          <label class="form-check-label" for="no">
            No
          </label>
        </div>
      </div>
    </div>

    <div class="col col-sm-6 col-md-10">
      <label class="form-label">Notes:</label>
      <textarea class="form-control" type="text" formControlName="notes"></textarea>
    </div>

    <div class="col col-sm-6">
      <label class="form-label">Crew Notes: (copied to all shifts)</label>
      <textarea class="form-control" type="text" formControlName="crewNotes"></textarea>
    </div>

    <div class="col col-sm-6">
      <label class="form-label">Office Notes: (copied to all shifts)</label>
      <textarea class="form-control" type="text" formControlName="officeNotes"></textarea>
    </div>

    <div class="col d-flex flex-col justify-content-end align-items-end text-end p-t-15">
      <button class="w-130 btn btn-primary" type="submit">
        {{ venueDetails() ? 'Save' : 'Add Venue' }}
        @if (loading()) {
          <i class="t-10 r-10 position-absolute fa-solid fa-circle-notch fa-spin"></i>
        }
      </button>
    </div>
  </div>
</form>
