<form [formGroup]="form">
  <!-- Job Part Type Dropdown -->
  <div class="row g-3 m-b-15">
    <div class="col-12 col-md-4">
      <label class="form-label">Type</label>
      <select2 [data]="jobPartTypes" formControlName="jobPartTypeId"></select2>
    </div>
  </div>

  <hr class="m-t-5 m-b-15">

  <!-- Main Fields Row -->
  <div class="row g-3 m-b-20">
    <div class="col-12 col-sm-6 col-md">
      <label class="form-label">Start date:</label>
      <input type="date" class="form-control" formControlName="startDate">
    </div>
    <div class="col-12 col-sm-6 col-md">
      <label class="form-label">Time:</label>
      <input type="time" class="form-control" formControlName="time">
    </div>
    <div class="col-12 col-sm-6 col-md">
      <label class="form-label">Hours</label>
      <select2 [data]="hoursOptions" formControlName="jobPartHours"></select2>
    </div>
    <div class="col-12 col-sm-6 col-md">
      <label class="form-label">Crew</label>
      <select2 [data]="crewOptions" formControlName="crewNumber"></select2>
    </div>
    <div class="col-12 col-sm-6 col-md">
      <label class="form-label">CC Suppl</label>
      <input type="number" step="0.01" class="form-control" formControlName="ccSupplement">
    </div>
  </div>

  <!-- Accordion Section -->
  <div class="accordion m-b-20" ngbAccordion>
    <div class="accordion-item" ngbAccordionItem [collapsed]="true">
      <h2 class="accordion-header" ngbAccordionHeader>
        <button class="accordion-button" type="button" ngbAccordionButton>
          <span class="accordion-title">OOT - Out of town / travel costs</span>
          <span class="cost-badge ms-auto me-2">£0.00</span>
        </button>
      </h2>
      <div ngbAccordionCollapse>
        <div ngbAccordionBody>
          <ng-template>
            <div class="row g-3 p-t-10">
              <div class="col">
                <label class="form-label">Travel Hours:</label>
                <select class="form-select form-select-sm" formControlName="travelHours">
                  @for (h of travelHoursOptions; track h.value) {
                    <option [value]="h.value">{{ h.label }}</option>
                  }
                </select>
              </div>
              <div class="col">
                <label class="form-label">Cost:</label>
                <input type="number" step="0.01" class="form-control form-control-sm" formControlName="travelHoursCost">
              </div>
              <div class="col">
                <label class="form-label">Milage:</label>
                <input type="number" class="form-control form-control-sm" formControlName="returnMileage">
              </div>
              <div class="col">
                <label class="form-label">OOT Travel:</label>
                <input type="number" step="0.01" class="form-control form-control-sm" formControlName="ootCost">
              </div>
              <div class="col">
                <label class="form-label">Late Shift:</label>
                <input type="number" step="0.01" class="form-control form-control-sm" formControlName="lateShiftCost">
              </div>
              <div class="col">
                <label class="form-label">Cost(75p):</label>
                <input type="number" step="0.01" class="form-control form-control-sm" formControlName="fuelCost">
              </div>
              <div class="col">
                <label class="form-label">To Crew:</label>
                <input type="number" step="0.01" class="form-control form-control-sm" formControlName="fuelCostCrew">
              </div>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Fields Row -->
  <div class="row g-3 m-b-20">
    <div class="col-12 col-md-3">
      <label class="form-label">Alternative venue:</label>
      <input type="text" class="form-control" formControlName="jobPartVenueName">
    </div>
    <div class="col-12 col-md-2">
      <label class="form-label">Postcode:</label>
      <input type="text" class="form-control" formControlName="jobPartVenuePostcode">
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label">Onsite contact:</label>
      <input type="text" class="form-control" formControlName="onsiteContact">
    </div>
    <div class="col-6 col-md-1">
      <label class="form-label">AlpDr:</label>
      <input type="number" class="form-control" formControlName="alphaDrivers">
    </div>
    <div class="col-6 col-md-3 d-flex align-items-end justify-content-end">
      <span class="total-cost">£0.00</span>
    </div>
  </div>

  <!-- Notes Section -->
  <div class="notes-section m-b-20">
    <div class="notes-header d-flex align-items-stretch">
      <div class="form-check important-check d-flex align-items-center gap-2 flex-shrink-0">
        <input type="checkbox" id="importantNotesCheckbox" class="form-check-input m-0"
               formControlName="importantNotes">
        <label class="form-check-label fw-bold m-0" for="importantNotesCheckbox">
          Important
        </label>
      </div>
      <ul class="nav notes-tabs flex-grow-1 m-0">
        <li class="nav-item">
          <button type="button" class="nav-link" [class.active]="activeNotesTab === 1"
                  (click)="activeNotesTab = 1">OFFICE NOTES</button>
        </li>
        <li class="nav-item">
          <button type="button" class="nav-link" [class.active]="activeNotesTab === 2"
                  (click)="activeNotesTab = 2">CREW (APP) NOTES</button>
        </li>
        <li class="nav-item">
          <button type="button" class="nav-link" [class.active]="activeNotesTab === 3"
                  (click)="activeNotesTab = 3">PAPERWORK NOTES</button>
        </li>
      </ul>
    </div>
    <div class="notes-content">
      @if (activeNotesTab === 1) {
        <textarea class="form-control border-0" rows="4"
                  formControlName="notes"
                  placeholder="Office notes..."></textarea>
      }
      @if (activeNotesTab === 2) {
        <textarea class="form-control border-0" rows="4"
                  formControlName="crewNotes"
                  placeholder="Crew notes..."></textarea>
      }
      @if (activeNotesTab === 3) {
        <textarea class="form-control border-0" rows="4"
                  formControlName="paperworkNotes"
                  placeholder="Paperwork notes..."></textarea>
      }
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="d-flex justify-content-end gap-3">
    <button type="button" class="btn btn-danger px-4" (click)="save.emit()">SAVE</button>
    <button type="button" class="btn btn-danger px-4" (click)="cancel.emit()">CANCEL</button>
  </div>
</form>
