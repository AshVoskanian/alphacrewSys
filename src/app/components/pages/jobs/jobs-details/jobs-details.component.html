<div class="p-x-10 p-y-15">
  <app-card>
    <div class="job-details-header d-flex align-items-stretch justify-content-between gap-3">
      <div class="d-flex align-items-center gap-10 min-w-0 flex-shrink-0">
        <i (click)="goBack()"
           class="job-details-back-icon pointer fa-solid fa-circle-chevron-left txt-primary flex-shrink-0"></i>
        <h3 class="job-details-title m-0 text-truncate">Job Details</h3>
        <i class="job-details-info-icon fa-solid fa-{{jobDetails()?.loader ? 'spinner' : 'circle-info'}} txt-primary pointer flex-shrink-0"
           (click)="getActivities(jobDetails(), popoverRef)"
           #popoverRef="ngbPopover"
           triggers="manual"
           [autoClose]="'outside'"
           [popoverClass]="'wide-popover border min-w-370 max-w-800 bg-dark'"
           [popoverTitle]="'Recent Activity'"
           [ngbPopover]="activities"></i>
      </div>

      <div class="job-details-toolbar d-flex flex-wrap align-items-center min-w-0 flex-grow-1">
        <div class="fw-bold job-details-rate-label text-truncate"
             [attr.title]="editJobRef?.rateCardLabel ?? ''">
          {{ editJobRef?.rateCardLabel }}
        </div>
        <div class="d-flex align-items-center gap-10 flex-shrink-0">
          <label class="form-label m-b-0 f-12 text-nowrap" for="publishToAppHeader">Publish to App</label>
          <div class="form-check form-switch m-0">
            <input class="form-check-input"
                   type="checkbox"
                   id="publishToAppHeader"
                   [checked]="editJobRef?.form?.get('publish')?.value"
                   (change)="editJobRef?.form?.patchValue({ publish: $any($event.target).checked })">
          </div>
        </div>

        <div class="job-details-credit-block">
          <div class="txt-secondary f-12 text-nowrap">
            Credit Limit: {{ jobDetails()?.clientLimit?.creditLimit | currency:'GBP':'symbol':'1.2-2' }}
          </div>
          <div class="f-12 fw-bold text-nowrap"
               [class.text-success]="!overUtilisation"
               [class.txt-danger]="overUtilisation">
            Credit Utilisation: {{ jobDetails()?.clientLimit?.clientUtilisation | currency:'GBP':'symbol':'1.2-2' }}
          </div>
        </div>

        <div class="border border-2 rounded-3 flex-shrink-0"
             [class.border-dark]="!editJobRef?.rateCardChanged"
             [class.border-danger]="editJobRef?.rateCardChanged"
        >
          <button
            type="button"
            class="btn d-flex flex-wrap align-items-center gap-2 p-x-6 p-y-4 job-details-finance-btn"
            (click)="editJobRef?.toggleFinanceAccordion()">
          <span class="badge t-0 position-static"
                [class.bg-primary]="!editJobRef?.currencyChanged"
                [class.bg-danger]="editJobRef?.currencyChanged"
                [ngbTooltip]="editJobRef?.currencyBadgeTooltip"
                container="body"
                [openDelay]="200"
                placement="bottom">{{ editJobRef?.currencyBadgeLabel ?? '—' }}
          </span>
            <span class="badge t-0 position-static"
                  [class.bg-primary]="editJobRef?.prePaymentBadgeValue <= 0"
                  [class.bg-danger]="editJobRef?.prePaymentBadgeValue > 0"
                  [ngbTooltip]="editJobRef?.prePaymentBadgeTooltip"
                  container="body"
                  [openDelay]="200"
                  placement="bottom">Pre
          </span>
            <span class="badge t-0 position-static"
                  [class.bg-primary]="editJobRef?.discountBadgeValue <= 0"
                  [class.bg-danger]="editJobRef?.discountBadgeValue > 0"
                  [ngbTooltip]="editJobRef?.discountBadgeTooltip"
                  container="body"
                  [openDelay]="200"
                  placement="bottom">Disc
          </span>
            <span class="badge t-0 position-static"
                  [class.bg-primary]="!editJobRef?.vatChanged"
                  [class.bg-danger]="editJobRef?.vatChanged">
              VAT
            </span>
          </button>
        </div>

        <div class="d-flex align-items-center gap-2 flex-shrink-0">
          <select
            class="form-select form-select-sm job-details-download-select"
            #downloadSelect
            (change)="onDownloadReport(downloadSelect, $any($event.target).value)">
            <option value="" disabled selected>Download</option>
            @for (opt of downloadReportOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
          <a
            [href]="getMapsUrl(editJobRef?.form?.get('venue')?.value ?? jobDetails()?.venue)"
            target="_blank"
            rel="noopener noreferrer"
            class="btn btn-sm btn-outline-primary d-flex align-items-center justify-content-center p-2 w-28 h-28 flex-shrink-0"
            [ngbTooltip]="'Open in maps'"
            container="body"
            [openDelay]="200">
            <i class="fa-solid fa-map-location-dot f-16"></i>
          </a>
        </div>

        <button
          class="btn btn-primary position-relative job-details-save-btn flex-shrink-0"
          type="button"
          (click)="editJobRef.submit()"
          [disabled]="!editJobRef?.form?.valid || editJobRef?.loading?.()">
          Save
          @if (editJobRef?.loading?.()) {
            <i class="t-10 r-10 position-absolute fa-solid fa-circle-notch fa-spin"></i>
          }
        </button>
      </div>
    </div>

    <div class="m-t-20">
      <app-edit-job
        #editJobRef
        [jobDetails]="jobDetails()"
        [jobWarnings]="jobWarnings()"
        [jobRateCard]="jobRateCard()"
        (partialPaymentsUpdated)="onPartialPaymentsUpdated($event)"
        (jobPartsUpdated)="getDetails()">
      </app-edit-job>
    </div>
  </app-card>
</div>

<!--Recent Activities-->
<ng-template #activities>
  <app-activity [activityList]="activityList()"></app-activity>
</ng-template>
